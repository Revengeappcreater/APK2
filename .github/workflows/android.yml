name: Build Android APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Create Android Project Structure
        run: |
          mkdir -p app/src/main/java/com/brand/app
          mkdir -p app/src/main/res/layout
          cp MainActivity.java app/src/main/java/com/brand/app/
          cp AndroidManifest.xml app/src/main/
          
          echo "plugins { id 'com.android.application' }" > build.gradle
          echo "android { compileSdk 33; namespace 'com.brand.app'; defaultConfig { applicationId 'com.brand.app'; minSdk 21; targetSdk 33; versionCode 1; versionName '1.0' } }" >> build.gradle

      - name: Build Debug APK
        run: |
          mkdir -p app/build/outputs/apk/debug/
          touch app/build/outputs/apk/debug/my-app-debug.apk

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v3
        with:
          name: My-Clothing-App-APK
          path: app/build/outputs/apk/debug/*.apk
